name: deploy to production

on:
  push:
    branches:
      - main

env:
  BACKEND_CONTEXT: ./new-backend
  DOCKERFILE_PATH: ./new-backend/Dockerfile
  IMAGE_REPOSITORY: yourbeep
  OPS_MANIFEST_PATH: manifest.yml
  OPS_REPO: chemic07/yourbeep_ops

jobs:
  build:
    name: build and push docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - identity
          - content
          - commerce

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          build-args: |
            APP_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:${{ matrix.service }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:${{ matrix.service }}-latest

  update-ops:
    name: update ops repo image tags
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clone ops repo
        env:
          OPS_REPO: ${{ env.OPS_REPO }}
          OPS_PAT: ${{ secrets.YOURBEEP_PAT }}
        run: |
          git clone https://${OPS_PAT}@github.com/${OPS_REPO}.git ops-repo

      - name: Update image tags in manifest
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          MANIFEST_PATH: ${{ env.OPS_MANIFEST_PATH }}
        run: |
          cd ops-repo
          sed -i "s|${DOCKER_USER}/${IMAGE_REPOSITORY}:gateway-.*|${DOCKER_USER}/${IMAGE_REPOSITORY}:gateway-${GITHUB_SHA}|g" "${MANIFEST_PATH}"
          sed -i "s|${DOCKER_USER}/${IMAGE_REPOSITORY}:identity-.*|${DOCKER_USER}/${IMAGE_REPOSITORY}:identity-${GITHUB_SHA}|g" "${MANIFEST_PATH}"
          sed -i "s|${DOCKER_USER}/${IMAGE_REPOSITORY}:content-.*|${DOCKER_USER}/${IMAGE_REPOSITORY}:content-${GITHUB_SHA}|g" "${MANIFEST_PATH}"
          sed -i "s|${DOCKER_USER}/${IMAGE_REPOSITORY}:commerce-.*|${DOCKER_USER}/${IMAGE_REPOSITORY}:commerce-${GITHUB_SHA}|g" "${MANIFEST_PATH}"

      - name: Commit and push manifest update
        env:
          GITHUB_SHA: ${{ github.sha }}
          MANIFEST_PATH: ${{ env.OPS_MANIFEST_PATH }}
        run: |
          cd ops-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add "${MANIFEST_PATH}"
          git diff --cached --quiet && exit 0
          git commit -m "update yourbeep images to ${GITHUB_SHA}"
          git push origin HEAD:main
